<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Year 1 Training Calendar · NTU Business Solutions · AY 2026/27</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:          #041840;
  --bg-2:        #061D4A;
  --bg-3:        #0A2462;
  --royal:       #030A8C;
  --gold:        #A67D4B;
  --gold-hi:     #BF9660;
  --gold-dim:    rgba(166,125,75,0.10);
  --gold-line:   rgba(166,125,75,0.22);
  --black:       #0D0D0D;

  --ink:         #EDE9DF;
  --ink-2:       rgba(237,233,223,0.62);
  --ink-3:       rgba(237,233,223,0.28);
  --ink-4:       rgba(237,233,223,0.09);

  /* kept for JS inline usage */
  --buffer:      rgba(110,130,230,0.65);
  --muted:       rgba(237,233,223,0.28);

  --radius:      3px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: 100%; }

body {
  background: var(--bg);
  color: var(--ink);
  font-family: 'Outfit', sans-serif;
  font-size: 14px;
  line-height: 1.5;
  padding: clamp(24px, 4vw, 56px);
  overflow-x: hidden;
  min-height: 100vh;
  /* subtle dot grid */
  background-image:
    radial-gradient(rgba(237,233,223,0.06) 1px, transparent 1px);
  background-size: 28px 28px;
}

/* depth gradient overlay */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background:
    radial-gradient(ellipse 70% 55% at 10% 0%,   rgba(3,10,140,0.22) 0%, transparent 60%),
    radial-gradient(ellipse 45% 35% at 92% 100%,  rgba(166,125,75,0.07) 0%, transparent 55%),
    linear-gradient(180deg, rgba(4,24,64,0) 0%, rgba(4,24,64,0.35) 100%);
  pointer-events: none;
  z-index: 0;
}

.wrap { max-width: 1100px; margin: 0 auto; position: relative; z-index: 1; }

/* ── Header ──────────────────────────────── */
header.masthead {
  border-bottom: 1px solid var(--gold-line);
  padding-bottom: 28px;
  margin-bottom: 28px;
}

.eyebrow {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.22em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 16px;
}

h1 {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 500;
  font-size: clamp(38px, 6.5vw, 68px);
  line-height: 0.94;
  letter-spacing: -0.02em;
  margin-bottom: 22px;
  color: var(--ink);
}

.meta {
  display: flex;
  flex-wrap: wrap;
  gap: 4px 0;
  align-items: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 11px;
  color: var(--ink-2);
}
.meta b    { color: var(--ink); font-weight: 500; }
.meta .dot { color: var(--gold); margin: 0 11px; opacity: 0.5; }

/* ── Bar ─────────────────────────────────── */
.bar {
  display: flex;
  flex-wrap: wrap;
  gap: 16px 28px;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 32px;
}

.legend {
  display: flex;
  flex-wrap: wrap;
  gap: 8px 20px;
  align-items: center;
}
.legend .item {
  display: inline-flex;
  align-items: center;
  gap: 7px;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--ink-2);
}
.swatch {
  width: 11px;
  height: 11px;
  flex: none;
  border-radius: 2px;
}
.swatch.go  { background: var(--gold-dim);               border: 1px solid var(--gold); }
.swatch.buf { background: rgba(3,10,140,0.18);            border: 1px solid rgba(110,130,230,0.4); }
.swatch.hol { background: rgba(180,40,40,0.14);           border: 1px solid rgba(200,80,80,0.45); }
.swatch.rec { background: rgba(237,233,223,0.04);         border: 1px dashed var(--ink-3); }
.swatch.brk { background: rgba(237,233,223,0.03);         border: 1px solid var(--ink-4); }
.swatch.evt { background: rgba(3,10,140,0.14);            border: 1px solid rgba(3,10,140,0.45); }

.toggle {
  display: inline-flex;
  border: 1px solid var(--gold-line);
  border-radius: var(--radius);
  overflow: hidden;
}
.toggle button {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-2);
  border: 0;
  background: transparent;
  padding: 8px 18px;
  cursor: pointer;
  transition: background 0.15s, color 0.15s;
  border-right: 1px solid var(--gold-line);
}
.toggle button:last-child { border-right: 0; }
.toggle button[aria-pressed="true"] { background: var(--gold); color: var(--black); }
.toggle button:focus-visible { outline: 1px solid var(--gold); outline-offset: -1px; }

/* ── Months ──────────────────────────────── */
.months {
  display: flex;
  flex-direction: column;
  gap: 0;
  animation: fadeUp 0.4s ease both;
}
.month {
  border-bottom: 1px solid var(--gold-line);
  padding: 26px 0 30px;
}
.month:first-child { border-top: 1px solid var(--gold-line); }
.month.is-break { opacity: 0.65; }

.month-head {
  display: flex;
  align-items: baseline;
  gap: 14px;
  flex-wrap: wrap;
}
.month-name {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 500;
  font-size: 30px;
  letter-spacing: -0.015em;
  line-height: 1;
  color: var(--ink);
}
.month-name span {
  font-size: 20px;
  font-weight: 400;
  color: var(--ink-3);
  margin-left: 8px;
}

.ribbon {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  letter-spacing: 0.04em;
  color: var(--ink-2);
  margin: 7px 0 0;
}
.ribbon b { color: var(--gold); font-weight: 500; }

.dow {
  display: grid;
  grid-template-columns: repeat(7, minmax(0,1fr));
  gap: 4px;
  margin: 16px 0 5px;
}
.dow span {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  font-weight: 500;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding-left: 2px;
}
.dow span.sat { color: var(--gold); opacity: 0.65; }

.grid {
  display: grid;
  grid-template-columns: repeat(7, minmax(0,1fr));
  gap: 4px;
}

.cell {
  min-height: 90px;
  padding: 8px 9px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  position: relative;
  border-radius: var(--radius);
}
.cell.empty { visibility: hidden; }

.ctop {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: 4px;
}
.num {
  font-family: 'JetBrains Mono', monospace;
  font-size: 13px;
  font-weight: 400;
  color: var(--ink-3);
  line-height: 1;
}
.sno {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.06em;
  line-height: 1;
  color: var(--ink-3);
}
.cbody {
  display: flex;
  flex-direction: column;
  gap: 4px;
  min-width: 0;
  flex: 1;
}

/* off */
.cell.off .num { color: var(--ink-4); }

/* break */
.cell.brk { background: rgba(237,233,223,0.02); }
.cell.brk .num { color: var(--ink-4); }

/* recess */
.cell.recess {
  background: rgba(237,233,223,0.03);
  border: 1px dashed rgba(237,233,223,0.09);
}
.cell.recess .num { color: var(--ink-3); }
.cell.recess .rlabel {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--ink-3);
}

/* session */
.cell.session {
  background: var(--gold-dim);
  border-left: 2px solid var(--gold);
  cursor: pointer;
  transition: background 0.14s, transform 0.1s;
}
.cell.session:hover {
  background: rgba(166,125,75,0.17);
  transform: translateY(-1px);
}
.cell.session .num  { font-size: 15px; font-weight: 500; color: var(--gold); }
.cell.session .sno  { color: var(--gold); opacity: 0.55; }
.cell.session .time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  color: var(--gold);
  opacity: 0.75;
  letter-spacing: 0.03em;
}
.cell.session .slots { display: flex; flex-direction: column; gap: 3px; }
.cell.session .slot  { display: flex; gap: 5px; align-items: baseline; min-width: 0; }
.cell.session .slot .lbl {
  font-family: 'JetBrains Mono', monospace;
  font-size: 7px;
  font-weight: 500;
  letter-spacing: 0.1em;
  color: var(--gold);
  opacity: 0.65;
  flex: none;
  align-self: flex-start;
  margin-top: 2px;
}
.cell.session .slot .txt {
  font-size: 10.5px;
  color: var(--ink);
  font-weight: 400;
  line-height: 1.3;
  min-width: 0;
}
.cell.session.has-data { border-left-width: 3px; }
.cell.session.has-data::after {
  content: '';
  position: absolute;
  top: 7px;
  right: 7px;
  width: 4px;
  height: 4px;
  border-radius: 50%;
  background: var(--gold);
  opacity: 0.8;
}
.cell.session .stored-loc {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8px;
  color: var(--gold);
  opacity: 0.6;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

/* buffer */
.cell.buffer {
  background: rgba(3,10,140,0.12);
  border-left: 2px solid rgba(110,130,230,0.35);
}
.cell.buffer .num  { font-size: 15px; font-weight: 500; color: rgba(110,130,230,0.65); }
.cell.buffer .sno  { color: rgba(110,130,230,0.4); }
.cell.buffer .time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  color: rgba(110,130,230,0.55);
  letter-spacing: 0.03em;
}

/* holiday */
.cell.holiday {
  background: rgba(180,40,40,0.08);
  border-left: 2px solid rgba(200,80,80,0.4);
}
.cell.holiday      .num { font-size: 15px; font-weight: 500; color: rgba(210,100,100,0.85); }
.cell.holiday.soft .num { color: rgba(190,90,90,0.55); }
.cell.holiday      .hol { font-size: 10px; font-weight: 500; color: rgba(210,100,100,0.8); line-height: 1.25; }
.cell.holiday.soft .hol { color: rgba(190,90,90,0.55); font-weight: 400; }
.cell.holiday .hol small { display: block; font-size: 9px; font-weight: 400; color: rgba(190,90,90,0.5); }

/* social event */
.cell.event {
  background: rgba(3,10,140,0.12);
  border-left: 2px solid rgba(3,10,140,0.5);
}
.cell.event .num        { font-size: 15px; font-weight: 500; color: rgba(120,150,255,0.8); }
.cell.event .event-name { font-size: 10.5px; font-weight: 500; color: rgba(140,165,255,0.8); line-height: 1.25; }
.cell.event .event-time {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  color: rgba(120,150,255,0.55);
}

/* ── List view ───────────────────────────── */
.list {
  display: none;
  border-top: 1px solid var(--gold-line);
  animation: fadeUp 0.3s ease both;
}
.list.show { display: block; }
.months.hide { display: none; }

.lgroup-head {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-weight: 500;
  font-size: 20px;
  color: var(--ink);
  padding: 22px 0 10px;
  border-bottom: 1px solid var(--gold-line);
  letter-spacing: 0.005em;
}

.lbreak {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--ink-3);
  padding: 14px 0;
  text-align: center;
  border-bottom: 1px solid var(--ink-4);
}

.lrow {
  display: grid;
  grid-template-columns: 44px 130px 130px 1fr;
  gap: 16px;
  align-items: center;
  padding: 14px 0;
  border-bottom: 1px solid var(--ink-4);
  cursor: pointer;
  transition: background 0.12s;
}
.lrow:last-child  { border-bottom: 0; }
.lrow:hover       { background: rgba(166,125,75,0.05); }

.lrow .lno {
  display: inline-flex;
  align-items: center;
  justify-content: center;
  width: 32px;
  height: 32px;
  border: 1px solid var(--gold-line);
  color: var(--gold);
  font-family: 'JetBrains Mono', monospace;
  font-weight: 500;
  font-size: 12px;
  border-radius: var(--radius);
}
.lrow.lbuf          { cursor: default; }
.lrow.lbuf:hover    { background: transparent; }
.lrow.lbuf .lno     { border-color: rgba(110,130,230,0.3); color: rgba(110,130,230,0.55); }

.lrow .ldate        { font-weight: 500; font-size: 13px; color: var(--ink); }
.lrow .ldate small  {
  display: block;
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  color: var(--ink-2);
  font-weight: 400;
  margin-top: 2px;
}
.lrow .ltime {
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
  color: var(--gold);
  font-weight: 400;
  letter-spacing: 0.02em;
}
.lrow.lbuf .ltime   { color: rgba(110,130,230,0.55); }
.lrow .lfocus       { font-size: 12.5px; color: var(--ink-2); }
.lrow .lfocus b     { color: var(--ink); font-weight: 500; }
.lrow .lfocus .arrow { color: var(--gold); margin: 0 8px; opacity: 0.45; }
.lrow.has-data .lno { border-color: var(--gold); background: var(--gold-dim); }

/* ── Modal ───────────────────────────────── */
.session-modal {
  position: fixed;
  inset: 0;
  z-index: 1000;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 20px;
}
.modal-backdrop {
  position: absolute;
  inset: 0;
  background: rgba(4,24,64,0.88);
  backdrop-filter: blur(5px);
}
.modal-box {
  position: relative;
  background: var(--bg-2);
  border: 1px solid var(--gold-line);
  border-radius: var(--radius);
  box-shadow: 0 28px 72px rgba(0,0,0,0.65);
  width: 100%;
  max-width: 520px;
  max-height: 90vh;
  overflow-y: auto;
}
.modal-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  padding: 20px 22px 16px;
  border-bottom: 1px solid var(--gold-line);
}
.modal-sno {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: var(--gold);
  margin-bottom: 6px;
}
.modal-date {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-size: 22px;
  font-weight: 500;
  color: var(--ink);
  line-height: 1.15;
}
.modal-close-btn {
  background: none;
  border: 1px solid var(--gold-line);
  color: var(--ink-2);
  cursor: pointer;
  width: 30px;
  height: 30px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: var(--radius);
  font-size: 16px;
  flex: none;
  transition: border-color 0.15s, color 0.15s;
}
.modal-close-btn:hover { border-color: var(--gold); color: var(--ink); }

.modal-base {
  padding: 11px 22px;
  background: var(--gold-dim);
  border-bottom: 1px solid var(--gold-line);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10.5px;
}
.modal-base .mb-time   { color: var(--gold); font-weight: 500; margin-bottom: 3px; }
.modal-base .mb-focus  { color: var(--ink-2); }

.modal-fields {
  padding: 18px 22px 4px;
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 14px 16px;
}
.mfield        { display: flex; flex-direction: column; gap: 5px; }
.mfield.full   { grid-column: 1 / -1; }
.mfield label  {
  font-family: 'JetBrains Mono', monospace;
  font-size: 8.5px;
  font-weight: 500;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: var(--ink-3);
}
.mfield input, .mfield textarea {
  font-family: 'Outfit', sans-serif;
  font-size: 13px;
  border: 1px solid rgba(237,233,223,0.10);
  border-radius: var(--radius);
  padding: 9px 12px;
  color: var(--ink);
  background: rgba(255,255,255,0.04);
  resize: vertical;
  transition: border-color 0.15s, box-shadow 0.15s;
}
.mfield input::placeholder, .mfield textarea::placeholder { color: var(--ink-3); }
.mfield input:focus, .mfield textarea:focus {
  outline: none;
  border-color: var(--gold);
  box-shadow: 0 0 0 2px rgba(166,125,75,0.14);
}
.mfield textarea { min-height: 72px; }

.modal-actions {
  padding: 14px 22px 20px;
  display: flex;
  gap: 10px;
  justify-content: flex-end;
  border-top: 1px solid var(--gold-line);
  margin-top: 14px;
}
.btn-cancel {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: 1px solid var(--gold-line);
  background: transparent;
  color: var(--ink-2);
  padding: 9px 20px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.12s, color 0.12s;
}
.btn-cancel:hover { border-color: var(--ink-2); color: var(--ink); }
.btn-save {
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  font-weight: 500;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  border: none;
  background: var(--gold);
  color: var(--black);
  padding: 9px 22px;
  border-radius: var(--radius);
  cursor: pointer;
  transition: background 0.12s;
}
.btn-save:hover { background: var(--gold-hi); }

/* ── Footer ──────────────────────────────── */
footer {
  margin-top: 44px;
  padding-top: 20px;
  border-top: 1px solid var(--gold-line);
  font-family: 'JetBrains Mono', monospace;
  font-size: 9.5px;
  color: var(--ink-3);
  line-height: 1.9;
  letter-spacing: 0.04em;
}

/* ── Animation ───────────────────────────── */
@keyframes fadeUp {
  from { opacity: 0; transform: translateY(10px); }
  to   { opacity: 1; transform: translateY(0); }
}

/* ── Responsive ──────────────────────────── */
@media (max-width: 720px) {
  .cell { min-height: 74px; padding: 6px 7px; }
  .cell.session .time { font-size: 7.5px; }
  .cell.session .slot { font-size: 9.5px; }
  .num { font-size: 12px; }
  .cell.session .num, .cell.buffer .num, .cell.holiday .num, .cell.event .num { font-size: 13px; }
  .modal-fields { grid-template-columns: 1fr; }
  .mfield.full { grid-column: 1; }
}
@media (max-width: 520px) {
  .cell { min-height: 54px; }
  .cell.session .slots, .cell.session .time { display: none; }
  .ribbon { font-size: 9px; }
  .lrow { grid-template-columns: 40px 1fr; gap: 10px 12px; }
  .lrow .ltime  { grid-column: 2; }
  .lrow .lfocus { grid-column: 1 / -1; }
}
@media (prefers-reduced-motion: reduce) { *, *::before, *::after { transition: none !important; animation: none !important; } }
</style>
</head>
<body>
<div class="wrap">

  <header class="masthead">
    <p class="eyebrow">NTU Business Solutions · Training Season</p>
    <h1>Year 1 Training Calendar</h1>
    <div class="meta">
      <span><b>AY 2026/27</b></span><span class="dot">·</span>
      <span><b>14</b> training sessions</span><span class="dot">·</span>
      <span>28 Aug 2026 &ndash; 27 Feb 2027</span><span class="dot">·</span>
      <span>Saturdays unless noted</span>
    </div>
  </header>

  <div class="bar">
    <div class="legend">
      <span class="item"><span class="swatch go"></span>Training session</span>
      <span class="item"><span class="swatch buf"></span>Buffer &mdash; no session</span>
      <span class="item"><span class="swatch hol"></span>Public holiday</span>
      <span class="item"><span class="swatch rec"></span>Recess week</span>
      <span class="item"><span class="swatch brk"></span>Break</span>
      <span class="item"><span class="swatch evt"></span>Social event</span>
    </div>
    <div class="toggle" role="group" aria-label="Choose view">
      <button id="btnCal" aria-pressed="true">Calendar</button>
      <button id="btnList" aria-pressed="false">List</button>
    </div>
  </div>

  <div class="months" id="months"></div>
  <div class="list" id="list"></div>

  <footer id="footer"></footer>
</div>

<!-- Session detail modal -->
<div id="session-modal" class="session-modal" style="display:none" role="dialog" aria-modal="true" aria-labelledby="modal-date">
  <div class="modal-backdrop" id="modal-backdrop"></div>
  <div class="modal-box">
    <div class="modal-header">
      <div>
        <div class="modal-sno" id="modal-sno"></div>
        <div class="modal-date" id="modal-date"></div>
      </div>
      <button class="modal-close-btn" id="modal-close" aria-label="Close">&times;</button>
    </div>
    <div class="modal-base" id="modal-base"></div>
    <div class="modal-fields">
      <div class="mfield">
        <label for="mf-time">Time</label>
        <input type="text" id="mf-time" placeholder="e.g. 9:00 AM – 5:00 PM" autocomplete="off">
      </div>
      <div class="mfield">
        <label for="mf-location">Location</label>
        <input type="text" id="mf-location" placeholder="e.g. NTU LT 7A" autocomplete="off">
      </div>
      <div class="mfield full">
        <label for="mf-case">Case for The Week</label>
        <input type="text" id="mf-case" placeholder="Case study or focus area for this session" autocomplete="off">
      </div>
      <div class="mfield full">
        <label for="mf-directors">Training Directors Coming</label>
        <input type="text" id="mf-directors" placeholder="Names, separated by commas" autocomplete="off">
      </div>
      <div class="mfield full">
        <label for="mf-remarks">Remarks</label>
        <textarea id="mf-remarks" placeholder="Any additional notes, reminders, or changes…"></textarea>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="modal-cancel">Cancel</button>
      <button class="btn-save" id="modal-save">Save</button>
    </div>
  </div>
</div>

<script>
/* ----- Training sessions ----- */
const SESSIONS = [
  {no:1,  date:"2026-08-29", time:"9:00 AM – 5:00 PM",   morning:"Appreciating the case", afternoon:"STI & Sliding"},
  {no:2,  date:"2026-09-05", time:"9:00 AM – 5:00 PM",   morning:"Present STI", afternoon:"Recommendation"},
  {no:3,  date:"2026-09-12", time:"9:00 AM – 5:00 PM",   morning:"Present STI + Rec.", afternoon:"Finance"},
  {no:4,  date:"2026-09-19", time:"9:00 AM – 12:30 PM",  morning:"Present case", afternoon:null},
  {no:5,  date:"2026-09-26", time:null,                  morning:null, afternoon:null, kind:"buffer"},
  {no:6,  date:"2026-10-03", time:"9:00 AM – 12:30 PM",  morning:"Present case", afternoon:null},
  {no:7,  date:"2026-10-10", time:"9:00 AM – 12:30 PM",  morning:"Present case", afternoon:null},
  {no:8,  date:"2026-10-17", time:"9:00 AM – 12:30 PM",  morning:"Present case", afternoon:null},
  {no:9,  date:"2027-01-02", time:"9:00 AM – 5:00 PM",   morning:"24hr presentation", afternoon:"Component training"},
  {no:10, date:"2027-01-09", time:"9:00 AM – 5:00 PM",   morning:"Present case", afternoon:"Component refresher"},
  {no:11, date:"2027-01-16", time:"9:00 AM – 12:30 PM",  morning:"Present case", afternoon:null},
  {no:12, date:"2027-01-23", time:"8:00 AM – 7:30 PM",   morning:"7-hr case · 0800–1500", afternoon:"Present · 1530–1930 · Tactics"},
  {no:13, date:"2027-01-30", time:"9:00 AM – 4:00 PM",   morning:"Present case", afternoon:"Tactics"},
  {no:14, date:"2027-02-20", time:"9:00 AM – 12:30 PM",  morning:"Present case", afternoon:null},
  {no:15, date:"2027-02-27", time:"TBC",                 morning:"24hr finale / week-long case", afternoon:null}
];

/* ----- Special social events ----- */
const SPECIAL_EVENTS = {
  "2026-8-28": {name:"Welcome Dinner", time:"6:00 PM – 10:00 PM"}
};

/* ----- Singapore public holidays (per NTU academic calendar, in range) ----- */
const HOLIDAYS = {
  "2026-8-9":  {name:"National Day"},
  "2026-8-10": {name:"National Day", sub:"replacement", soft:true},
  "2026-11-8": {name:"Deepavali"},
  "2026-11-9": {name:"Deepavali", sub:"replacement", soft:true},
  "2026-12-25":{name:"Christmas Day"},
  "2027-2-6":  {name:"Chinese New Year"},
  "2027-2-7":  {name:"Chinese New Year"},
  "2027-2-8":  {name:"CNY", sub:"replacement", soft:true},
  "2027-3-10": {name:"Hari Raya Puasa", sub:"tentative date"},
  "2027-3-26": {name:"Good Friday"}
};

/* ----- Recess weeks (dashed) and general breaks (grey) ----- */
const RECESS_RANGES = [
  ["2026-09-28","2026-10-02"],   // Sem 1 recess week
  ["2027-03-01","2027-03-05"]    // Sem 2 recess week
];
const BREAK_RANGES = [
  ["2026-10-25","2026-10-31"],   // end of Oct
  ["2026-12-07","2027-01-08"]    // winter break
];

const MONTHS = [
  {y:2026,m:7},
  {y:2026,m:8,  ribbon:"<b>Sem 1 recess week</b> · 28 Sep – 2 Oct"},
  {y:2026,m:9},
  {y:2026,m:10, ribbon:"No training · <b>Deepavali</b> 8 Nov"},
  {y:2026,m:11, ribbon:"Winter break from 7 Dec · <b>Christmas Day</b> 25 Dec"},
  {y:2027,m:0},
  {y:2027,m:1,  ribbon:"<b>Chinese New Year</b> 6–7 Feb · training resumes Sat 20 Feb"},
  {y:2027,m:2,  ribbon:"<b>Sem 2 recess week</b> · 1 – 5 Mar · training season has ended"}
];

const DOW=["S","M","T","W","T","F","S"];
const MN=["January","February","March","April","May","June","July","August","September","October","November","December"];

/* lookup maps */
const sMap={}; SESSIONS.forEach(s=>{const[y,m,d]=s.date.split("-").map(Number);sMap[`${y}-${m}-${d}`]=s;});
function expand(ranges){const set=new Set();ranges.forEach(([a,b])=>{let d=parse(a),e=parse(b);while(d<=e){set.add(`${d.getFullYear()}-${d.getMonth()+1}-${d.getDate()}`);d.setDate(d.getDate()+1);}});return set;}
function parse(iso){const[y,m,d]=iso.split("-").map(Number);return new Date(y,m-1,d);}
const recessSet=expand(RECESS_RANGES), breakSet=expand(BREAK_RANGES);

/* ---------- localStorage helpers ---------- */
function getStored(no){
  try{const r=localStorage.getItem(`bizsol_s${no}`);return r?JSON.parse(r):{};}catch(e){return {};}
}
function setStored(no,data){
  try{localStorage.setItem(`bizsol_s${no}`,JSON.stringify(data));}catch(e){}
}
function hasAnyData(stored){
  return stored && Object.values(stored).some(v=>v&&v.trim&&v.trim());
}

/* ---------- Calendar render ---------- */
const monthsEl=document.getElementById("months");
MONTHS.forEach(M=>{
  const card=document.createElement("section");
  card.className="month"+(M.isBreak?" is-break":"");
  card.innerHTML=`<div class="month-head"><div class="month-name">${MN[M.m]} <span>${M.y}</span></div></div>`
    +(M.ribbon?`<p class="ribbon">${M.ribbon}</p>`:"");

  const dow=document.createElement("div");dow.className="dow";
  DOW.forEach((d,i)=>{const sp=document.createElement("span");sp.textContent=d;if(i===6)sp.className="sat";dow.appendChild(sp);});
  card.appendChild(dow);

  const grid=document.createElement("div");grid.className="grid";
  const first=new Date(M.y,M.m,1).getDay();
  const days=new Date(M.y,M.m+1,0).getDate();
  for(let i=0;i<first;i++){const e=document.createElement("div");e.className="cell empty";grid.appendChild(e);}

  for(let d=1;d<=days;d++){
    const key=`${M.y}-${M.m+1}-${d}`;
    const s=sMap[key], hol=HOLIDAYS[key], evt=SPECIAL_EVENTS[key];
    const cell=document.createElement("div");

    if(s){
      const buf=s.kind==="buffer";
      cell.className="cell "+(buf?"buffer":"session");
      let body;
      if(buf){
        body=`<div class="cbody"><span class="time">Buffer · no session</span></div>`;
      }else{
        let slots="";
        if(s.morning&&s.afternoon){
          slots=`<div class="slots">
            <div class="slot"><span class="lbl">AM</span><span class="txt">${s.morning}</span></div>
            <div class="slot"><span class="lbl">PM</span><span class="txt">${s.afternoon}</span></div></div>`;
        }else if(s.morning){
          slots=`<div class="slots"><div class="slot"><span class="txt">${s.morning}</span></div></div>`;
        }
        body=`<div class="cbody">${s.time?`<span class="time">${s.time}</span>`:""}${slots}</div>`;
        cell.dataset.sno=s.no;
      }
      cell.innerHTML=`<div class="ctop"><span class="num">${d}</span><span class="sno">S${s.no}</span></div>${body}`;
    } else if(evt){
      cell.className="cell event";
      cell.innerHTML=`<div class="ctop"><span class="num">${d}</span></div>
        <div class="cbody"><span class="event-name">${evt.name}</span>${evt.time?`<span class="event-time">${evt.time}</span>`:""}</div>`;
    } else if(hol){
      cell.className="cell holiday"+(hol.soft?" soft":"");
      cell.innerHTML=`<div class="ctop"><span class="num">${d}</span></div>
        <div class="cbody"><span class="hol">${hol.name}${hol.sub?`<small>${hol.sub}</small>`:""}</span></div>`;
    } else if(recessSet.has(key)){
      cell.className="cell recess";
      cell.innerHTML=`<div class="ctop"><span class="num">${d}</span></div>
        <div class="cbody"><span class="rlabel">Recess</span></div>`;
    } else if(breakSet.has(key)||M.isBreak){
      cell.className="cell brk";
      cell.innerHTML=`<div class="ctop"><span class="num">${d}</span></div>`;
    } else {
      cell.className="cell off";
      cell.innerHTML=`<div class="ctop"><span class="num">${d}</span></div>`;
    }
    grid.appendChild(cell);
  }
  card.appendChild(grid);
  monthsEl.appendChild(card);
});

/* ---------- List render ---------- */
const listEl=document.getElementById("list");
const GROUPS=[
  {head:"Season opens · Aug 2026", range:[1,1]},
  {head:"Foundations · Sep 2026", range:[2,5]},
  {brk:"Sem 1 Recess Week · 28 Sep – 2 Oct"},
  {head:"B2C / B2B reps · Oct 2026", range:[6,8]},
  {brk:"Winter Break · 7 Dec 2026 – 8 Jan 2027 — Christmas 25 Dec"},
  {head:"Winter intensive · Jan 2027", range:[9,13]},
  {brk:"CNY Break · Feb 2027 — Chinese New Year 6–7 Feb · training resumes Sat 20 Feb"},
  {head:"Finals stretch · Feb 2027", range:[14,15]},
  {brk:"Sem 2 Recess Week · 1 – 5 Mar 2027 — season ends"}
];
let html="";
GROUPS.forEach(g=>{
  if(g.brk){html+=`<div class="lbreak">${g.brk}</div>`;return;}
  html+=`<div class="lgroup-head">${g.head}</div>`;
  SESSIONS.filter(s=>s.no>=g.range[0]&&s.no<=g.range[1]).forEach(s=>html+=rowHTML(s));
});
listEl.innerHTML=html;
function rowHTML(s){
  const buf=s.kind==="buffer";
  const[y,m,d]=s.date.split("-").map(Number);const dt=new Date(y,m-1,d);
  const dd=dt.toLocaleDateString("en-GB",{day:"2-digit",month:"short",year:"numeric"});
  const wd=dt.toLocaleDateString("en-GB",{weekday:"long"});
  const focus=buf?`<span style="color:var(--buffer);font-weight:600;">Buffer — no session</span>`
    :`<b>${s.morning}</b>${s.afternoon?`<span class="arrow">→</span>${s.afternoon}`:""}`;
  return `<div class="lrow ${buf?"lbuf":""}" data-sno="${buf?"":s.no}">
    <span class="lno">${s.no}</span>
    <div class="ldate">${dd}<small>${wd}</small></div>
    <div class="ltime">${buf?"—":s.time}</div>
    <div class="lfocus">${focus}</div></div>`;
}

/* ---------- View toggle ---------- */
const btnCal=document.getElementById("btnCal"),btnList=document.getElementById("btnList");
function setView(cal){
  btnCal.setAttribute("aria-pressed",cal);btnList.setAttribute("aria-pressed",!cal);
  monthsEl.classList.toggle("hide",!cal);listEl.classList.toggle("show",!cal);
}
btnCal.addEventListener("click",()=>setView(true));
btnList.addEventListener("click",()=>setView(false));

/* ---------- Footer ---------- */
document.getElementById("footer").innerHTML=
  "NTU Business Solutions · Year 1 Training Schedule, AY 2026/27. "+
  "Public holidays and recess weeks follow the NTU academic calendar; in-lieu days marked “replacement”. "+
  "Case type, case number and remarks omitted by design. Times are SGT and subject to change. "+
  "Click any training session to add or view session details.";

/* ---------- Modal ---------- */
let currentSno=null;

function openModal(sno){
  const s=SESSIONS.find(x=>x.no===sno);
  if(!s||s.kind==="buffer")return;
  currentSno=sno;
  const stored=getStored(sno);
  const[y,m,d]=s.date.split("-").map(Number);
  const dt=new Date(y,m-1,d);

  document.getElementById("modal-sno").textContent=`Session ${s.no}`;
  document.getElementById("modal-date").textContent=
    dt.toLocaleDateString("en-GB",{weekday:"long",day:"numeric",month:"long",year:"numeric"});

  /* base schedule info */
  const base=document.getElementById("modal-base");
  let baseHtml="";
  if(s.time) baseHtml+=`<div class="mb-time">${s.time}</div>`;
  if(s.morning&&s.afternoon) baseHtml+=`<div class="mb-focus"><b>AM:</b> ${s.morning} &nbsp;·&nbsp; <b>PM:</b> ${s.afternoon}</div>`;
  else if(s.morning) baseHtml+=`<div class="mb-focus">${s.morning}</div>`;
  base.innerHTML=baseHtml||`<span style="color:var(--muted)">Schedule details TBC</span>`;

  /* fill stored fields */
  document.getElementById("mf-time").value=stored.time||"";
  document.getElementById("mf-location").value=stored.location||"";
  document.getElementById("mf-case").value=stored.caseOfWeek||"";
  document.getElementById("mf-directors").value=stored.directors||"";
  document.getElementById("mf-remarks").value=stored.remarks||"";

  const modal=document.getElementById("session-modal");
  modal.style.display="flex";
  setTimeout(()=>document.getElementById("mf-time").focus(),50);
}

function closeModal(){
  document.getElementById("session-modal").style.display="none";
  currentSno=null;
}

function saveModal(){
  if(currentSno===null)return;
  const data={
    time:document.getElementById("mf-time").value.trim(),
    location:document.getElementById("mf-location").value.trim(),
    caseOfWeek:document.getElementById("mf-case").value.trim(),
    directors:document.getElementById("mf-directors").value.trim(),
    remarks:document.getElementById("mf-remarks").value.trim()
  };
  setStored(currentSno,data);
  refreshCellIndicators(currentSno,data);
  closeModal();
}

document.getElementById("modal-close").addEventListener("click",closeModal);
document.getElementById("modal-cancel").addEventListener("click",closeModal);
document.getElementById("modal-save").addEventListener("click",saveModal);
document.getElementById("modal-backdrop").addEventListener("click",closeModal);
document.addEventListener("keydown",e=>{
  if(e.key==="Escape")closeModal();
  if(e.key==="Enter"&&e.metaKey&&currentSno!==null)saveModal();
});

/* ---------- Attach click handlers & apply stored indicators ---------- */
function refreshCellIndicators(sno,data){
  const hasData=hasAnyData(data);
  /* calendar cells */
  document.querySelectorAll(`.cell[data-sno="${sno}"]`).forEach(cell=>{
    cell.classList.toggle("has-data",hasData);
    const existing=cell.querySelector(".stored-loc");
    if(existing)existing.remove();
    if(hasData&&data.location){
      const loc=document.createElement("span");
      loc.className="stored-loc";
      loc.textContent="📍 "+data.location;
      cell.querySelector(".cbody").appendChild(loc);
    }
  });
  /* list rows */
  document.querySelectorAll(`.lrow[data-sno="${sno}"]`).forEach(row=>{
    row.classList.toggle("has-data",hasData);
  });
}

/* on load: attach click events and apply any saved data */
document.querySelectorAll(".cell.session[data-sno]").forEach(cell=>{
  const sno=parseInt(cell.dataset.sno,10);
  cell.addEventListener("click",()=>openModal(sno));
  const stored=getStored(sno);
  refreshCellIndicators(sno,stored);
});
document.querySelectorAll(".lrow[data-sno]").forEach(row=>{
  const sno=parseInt(row.dataset.sno,10);
  if(!sno)return;
  row.addEventListener("click",()=>openModal(sno));
});
/* also refresh list row indicators separately (cells already done above) */
SESSIONS.filter(s=>s.kind!=="buffer").forEach(s=>{
  const stored=getStored(s.no);
  if(hasAnyData(stored)){
    document.querySelectorAll(`.lrow[data-sno="${s.no}"]`).forEach(r=>r.classList.add("has-data"));
  }
});
</script>
</body>
</html>
